---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnsmasq-dns-deployment
  labels:
    app: dnsmasq-dns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dnsmasq-dns
  template:
    metadata:
      namespace: dnsmasq
      labels:
        app: dnsmasq-dns
    spec:
      containers:
      - name: dnsmasq
        image: vcf.lab/dnsmasq
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 53
          name: dns-tcp
          protocol: TCP
        - containerPort: 53
          name: dns-udp
          protocol: UDP
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
          - mountPath: '/etc/dnsmasq.conf'
            name: config-volume
            readOnly: true
            subPath: dnsmasq-dns.conf
          - mountPath: '/etc/hosts'
            name: config-volume
            readOnly: true
            subPath: hosts
      volumes:
        - name: config-volume
          configMap:
            name: dnsmasq
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnsmasq-dhcp-deployment
  labels:
    app: dnsmasq-dhcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dnsmasq-dhcp
  template:
    metadata:
      namespace: dnsmasq
      labels:
        app: dnsmasq-dhcp
    spec:
      hostNetwork: true
      containers:
      - name: dnsmasq
        image: vcf.lab/dnsmasq
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 67
          name: dhcp-tcp
          protocol: TCP
        - containerPort: 67
          name: dhcp-udp
          protocol: UDP
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi
        securityContext:
          capabilities:
            drop: ["all"]
            add: ["NET_ADMIN","NET_RAW","NET_BIND_SERVICE"]
        volumeMounts:
          - mountPath: '/etc/dnsmasq.conf'
            name: config-volume
            readOnly: true
            subPath: dnsmasq-dhcp.conf
          - mountPath: '/etc/hosts'
            name: config-volume
            readOnly: true
            subPath: hosts
      volumes:
        - name: config-volume
          configMap:
            name: dnsmasq
